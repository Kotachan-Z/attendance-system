# ============================================================
#  出席管理システム — nginx 設定サンプル（学内 LAN 向け）
# ============================================================
#
#  【前提】
#    - PHP-FPM がインストール済み（php8.3-fpm）
#    - Laravel アプリが /home/pi/attendance-systemV2/app/ にある
#
#  【手順】
#    1. このファイルを /etc/nginx/sites-available/attendance にコピー
#         sudo cp nginx.example.conf /etc/nginx/sites-available/attendance
#
#    2. root のパスを実際のパスに書き換える（↓の APP_ROOT 行）
#         sudo nano /etc/nginx/sites-available/attendance
#
#    3. デフォルト設定を無効化してこちらを有効化
#         sudo rm -f /etc/nginx/sites-enabled/default
#         sudo ln -s /etc/nginx/sites-available/attendance \
#                    /etc/nginx/sites-enabled/attendance
#
#    4. 設定を確認して nginx を再読み込み
#         sudo nginx -t && sudo systemctl reload nginx
#
#  【PHP-FPM のインストール（まだの場合）】
#    sudo apt-get install -y php8.3-fpm php8.3-mysql php8.3-mbstring \
#         php8.3-xml php8.3-curl php8.3-zip php8.3-bcmath php8.3-gd
#    sudo systemctl enable php8.3-fpm
#    sudo systemctl start php8.3-fpm
# ============================================================

server {
    listen 80;
    server_name _;   # 学内 LAN のみ。外部公開なら実際のドメイン or IP を書く

    # ★ ここだけ実際のパスに変更する（必ず /public まで指定）
    root /home/pi/attendance-systemV2/app/public;

    index index.php;

    # Laravel のルーティング（全リクエストを index.php に通す）
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM に転送
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # .env などの隠しファイルへのアクセスを禁止
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # 顔写真・撮影画像のアップロードサイズ上限
    client_max_body_size 8M;

    # ログ（問題が起きたときに確認する）
    access_log /var/log/nginx/attendance_access.log;
    error_log  /var/log/nginx/attendance_error.log;
}
