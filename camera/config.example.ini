# ============================================================
#  出席カメラ 設定ファイル（テンプレート）
# ------------------------------------------------------------
#  使い方:
#    1. このファイルを config.ini という名前でコピーする
#         cp config.example.ini config.ini
#    2. config.ini を開いて token などを実際の値に書き換える
#    3. config.ini は .gitignore 済み（秘密情報をコミットしないため）
#
#  ※ 数値の意味は各行のコメント参照。同名の環境変数があればそちらが優先。
# ============================================================

[api]
# Laravel API のベース URL
#   ※ `php artisan serve` は 127.0.0.1 のみで待ち受ける。localhost だと
#     IPv6(::1) に解決されて繋がらない環境があるので、開発時は 127.0.0.1 を推奨。
url   = http://127.0.0.1:8000/api
# カメラ認証トークン（Laravel 側 .env の CAMERA_API_TOKEN と"完全一致"させる）
#   本番では必ず推測困難なランダム値に変更すること。空のままだと認証は通りません。
token =
# 一時的な通信失敗(タイムアウト/接続断/5xx)時に即座に再試行する回数
retry_max = 3
# 即時リトライの間隔の基準秒（指数バックオフ: 0.5→1→2...）
retry_backoff_sec = 0.5
# API 到達不能時に出席記録を退避しておく上限件数。
#   超えたら古いものから破棄（メモリ保護）。0 以下で退避無効。
offline_queue_max = 500

[face]
# 顔認識モデル: buffalo_l(高精度・重い) / buffalo_s(軽量・速い)
model = buffalo_l
# 検出器の入力解像度(px)。大きいほど遠く・小さい顔に強いが重くなる
detection_size = 640
# 顔検出の信頼度の下限(0.0-1.0)。これ未満の検出は無視する
min_detection_confidence = 0.70
# 本人と判定する距離(コサイン距離)の上限。超えたら「未登録」。
#   小さいほど厳格（他人を本人と誤認しにくいが、本人を弾きやすい）。buffalo_l 推奨 0.38-0.45
match_threshold = 0.40
# 1位と2位の候補の距離差がこれ未満なら「曖昧」として記録しない
#   （似た二人のどちらか分からない取り違えを防ぐ）。大きいほど慎重
ambiguity_margin = 0.10
# 認識対象とする顔の最小サイズ(px)。これより小さい顔は無視（遠すぎる人を除外）
min_face_size = 60

[liveness]
# なりすまし判定の中心パラメータ。
#   顔領域の深度のばらつき(標準偏差, mm)がこの値未満なら「平面=写真/画面」とみなし拒否。
#   実物の顔は鼻の凹凸で大きくばらつく。値を上げるほど厳格（写真を弾きやすいが本人も弾きやすい）
depth_std_threshold_mm = 15
# 深度の有効範囲(mm)。この範囲外の画素はノイズとして除外する
depth_valid_min_mm = 100
depth_valid_max_mm = 2000
# 判定に必要な有効画素の最小数。これ未満なら「判定不能」として拒否（遠すぎ・隠れ対策）
depth_min_valid_pixels = 100
# 顔中央部の深度ばらつき(p90-p10)の上限(mm)。人間の顔中央部の凹凸はせいぜい十数cm。
#   これを超える場合は「スマホ画面の縁と背景の段差」が混入しているとみなして拒否する
depth_spread_max_mm = 150
# 顔 bbox を上下左右この比率だけ縮めて中央部のみを評価する（0.25 → 中央50%）。
#   周縁の背景・画面の縁を判定から除外する
depth_bbox_shrink_ratio = 0.25
# 評価パッチ内で有効な深度画素が占める最低比率。
#   スマホ画面や光沢面はステレオマッチングが崩れて有効率が下がるため、低い場合は拒否
depth_min_valid_ratio = 0.25

[recognition]
# 同じ人を連続検出したときの再記録の抑制時間(秒)
cooldown_sec = 5
# 学生リスト・進行中セッションのキャッシュ更新間隔(秒)
student_cache_ttl_sec = 30
# 顔検出を N フレームに1回だけ実行する（表示は毎フレーム）。大きいほど軽いが反応が鈍る
detect_interval = 3
# なりすまし疑い・識別不能を検出ログに再記録するまでの最小間隔(秒)
detection_log_cooldown_sec = 30
# テンポラル投票: この回数だけ連続して同一学生が照合されたとき初めて出席処理へ進む。
#   1フレームの偶発的な誤マッチ（横顔・まばたき・照明変化）を排除する。
temporal_vote_min = 3

[camera]
# 解像度・フレームレート（OAK-D-Lite RGB 上限: 1920x1080 @ 30fps）
width  = 1920
height = 1080
fps    = 30
# API に送る顔画像の JPEG 品質(1-100)。高いほど高画質・大容量
jpeg_quality = 85
# プレビューウィンドウを表示するか（1=表示 / 0=非表示）。本番(ラズパイ)は 0 推奨
debug_display = 0
